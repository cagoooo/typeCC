<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文注音打字遊戲 | Pro</title>
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/2328.svg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="manifest" href="./manifest.json">

</head>

<body class="theme-dark">
    <!-- 全域控制列 (設定) -->
    <div class="fixed top-4 right-4 z-[60] flex gap-3">
        <button id="keyboard-toggle"
            class="w-10 h-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition-all shadow-lg"
            title="開啟/關閉虛擬鍵盤">
            <i class="fas fa-keyboard"></i>
        </button>
        <button id="fullscreen-toggle"
            class="w-10 h-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition-all shadow-lg"
            title="全螢幕模式">
            <i class="fas fa-expand"></i>
        </button>
        <button id="tts-toggle"
            class="w-10 h-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition-all shadow-lg"
            title="語音朗讀開關">
            <i class="fas fa-volume-mute"></i>
        </button>
        <div class="relative group">
            <button id="theme-button"
                class="w-10 h-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-white/30 transition-all shadow-lg"
                title="切換主題">
                <i class="fas fa-palette"></i>
            </button>
            <div
                class="absolute top-12 right-0 hidden group-hover:flex flex-col gap-2 bg-gray-800/90 backdrop-blur-md border border-gray-700 p-2 rounded-lg min-w-[120px]">
                <button
                    class="theme-option px-3 py-2 rounded hover:bg-gray-700 text-sm text-white text-left whitespace-nowrap"
                    data-theme="dark">🌙 深色 (預設)</button>
                <button
                    class="theme-option px-3 py-2 rounded hover:bg-gray-700 text-sm text-white text-left whitespace-nowrap"
                    data-theme="light">☀️ 清新淺色</button>
                <button
                    class="theme-option px-3 py-2 rounded hover:bg-gray-700 text-sm text-white text-left whitespace-nowrap"
                    data-theme="ocean">🐟 海洋兒童</button>
            </div>
        </div>
    </div>
    <!-- 開始畫面 -->
    <div id="start-screen"
        class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-gradient-to-br from-indigo-900 to-purple-900 p-4">
        <h1
            class="text-4xl sm:text-5xl md:text-6xl font-bold mb-8 text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
            中文注音打字遊戲</h1>
        <p class="text-lg sm:text-xl mb-4 text-center max-w-md px-4">挑戰你的中文注音打字速度！輸入正確的注音符號或對應按鍵來消滅從天而降的字元。</p>

        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button id="diff-beginner"
                class="px-4 py-2 bg-emerald-600 rounded-lg border-2 border-transparent hover:border-white transition-all focus:border-white focus:outline-none difficulty-btn"
                data-level="beginner">初學者</button>
            <button id="diff-easy"
                class="px-4 py-2 bg-green-600 rounded-lg border-2 border-transparent hover:border-white transition-all focus:border-white focus:outline-none difficulty-btn active"
                data-level="easy">入門</button>
            <button id="diff-medium"
                class="px-4 py-2 bg-yellow-600 rounded-lg border-2 border-transparent hover:border-white transition-all focus:border-white focus:outline-none difficulty-btn"
                data-level="medium">進階</button>
            <button id="diff-hard"
                class="px-4 py-2 bg-red-600 rounded-lg border-2 border-transparent hover:border-white transition-all focus:border-white focus:outline-none difficulty-btn"
                data-level="hard">大師</button>
        </div>

        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button id="start-button"
                class="w-full px-6 py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white text-lg font-bold rounded-full hover:from-blue-600 hover:to-cyan-600 transition-all transform hover:scale-105 shadow-lg">開始遊戲</button>

            <!-- 自訂詞庫入口 -->
            <div class="flex gap-2">
                <input type="text" id="wordset-code-input" placeholder="代碼"
                    class="flex-1 px-4 py-2 bg-gray-800 border-2 border-indigo-400 rounded-lg text-white text-center font-bold uppercase focus:outline-none focus:border-cyan-400">
                <button id="load-wordset-button"
                    class="px-4 py-2 bg-indigo-600 rounded-lg font-bold hover:bg-indigo-700 transition-all">載入詞庫</button>
            </div>

            <button id="leaderboard-button"
                class="w-full px-6 py-3 bg-gray-800 border-2 border-indigo-500 text-white text-lg font-bold rounded-full hover:bg-gray-700 transition-all transform hover:scale-105 shadow-lg flex items-center justify-center">
                <i class="fas fa-trophy mr-2 text-yellow-400"></i> 全球排行榜
            </button>
        </div>
    </div>

    <!-- 教師工具按鈕 (固定右下角) -->
    <button id="teacher-tool-button"
        class="fixed bottom-6 right-6 w-12 h-12 bg-white/10 backdrop-blur-md border border-white/20 rounded-full flex items-center justify-center text-white/50 hover:text-white hover:bg-white/20 transition-all z-40 shadow-xl">
        <i class="fas fa-chalkboard-teacher text-xl"></i>
    </button>

    <!-- 遊戲畫面 -->
    <div id="game-container" class="hidden h-screen w-full relative">
        <!-- 狀態欄 -->
        <div
            class="fixed top-0 left-0 right-0 p-2 sm:p-4 flex flex-wrap justify-around items-center gap-2 sm:gap-4 bg-black bg-opacity-30 backdrop-blur-sm z-10">
            <div class="bg-blue-900 bg-opacity-50 px-3 py-1 sm:px-4 sm:py-2 rounded-lg text-sm sm:text-base">
                <span class="font-medium">已完成: </span>
                <span id="completed-count" class="text-base sm:text-lg font-bold text-cyan-400">0</span>
            </div>
            <div class="bg-purple-900 bg-opacity-50 px-3 py-1 sm:px-4 sm:py-2 rounded-lg text-sm sm:text-base">
                <span class="font-medium">分數: </span>
                <span id="score" class="text-base sm:text-lg font-bold text-yellow-400">0</span>
            </div>
            <div class="bg-red-900 bg-opacity-50 px-3 py-1 sm:px-4 sm:py-2 rounded-lg text-sm sm:text-base">
                <span class="font-medium">時間: </span>
                <span id="timer" class="text-base sm:text-lg font-bold text-red-400">180</span>
                <span class="font-medium">秒</span>
            </div>
            <div id="combo-container"
                class="bg-orange-900 bg-opacity-50 px-3 py-1 sm:px-4 sm:py-2 rounded-lg text-sm sm:text-base transition-all duration-300 opacity-50 scale-90">
                <span class="font-medium text-orange-200">連擊: </span>
                <span id="combo-count" class="text-base sm:text-lg font-bold text-orange-400">0</span>
            </div>
        </div>

        <div id="characters-container" class="w-full h-full"></div>

        <div class="fixed bottom-0 left-0 right-0 p-2 sm:p-4 input-area">
            <div class="relative" id="input-container">
                <input type="text" id="input-field"
                    class="w-full px-4 py-3 sm:px-6 sm:py-4 text-lg sm:text-xl bg-gray-800 bg-opacity-70 border-2 border-cyan-500 rounded-full text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-shadow duration-300"
                    placeholder="請直接輸入注音或對應按鍵..." autocomplete="off">
            </div>
        </div>
    </div>

    <div id="game-over"
        class="hidden fixed inset-0 flex flex-col items-center justify-center game-over-overlay z-50 p-4">
        <div
            class="bg-gradient-to-br from-gray-900 to-blue-900 p-6 sm:p-8 rounded-2xl max-w-md w-full border border-blue-500 shadow-2xl">
            <h2 id="game-over-title"
                class="text-2xl sm:text-3xl font-bold mb-4 text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                遊戲結束</h2>
            <div class="space-y-3 sm:space-y-4 mb-6 text-base sm:text-lg">
                <p class="text-lg sm:text-xl text-center">你的成績：</p>
                <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                    <span>完成字元：</span>
                    <span id="final-completed" class="font-bold text-cyan-400">0</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                    <span>最終得分：</span>
                    <span id="final-score" class="font-bold text-yellow-400">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span>剩餘時間：</span>
                    <span id="final-time" class="font-bold text-red-400">0秒</span>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 w-full">
                <button id="restart-button"
                    class="flex-1 px-4 py-2 sm:px-6 sm:py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white text-base sm:text-lg font-bold rounded-full hover:from-blue-600 hover:to-cyan-600 transition-all transform hover:scale-105 shadow-lg flex items-center justify-center">
                    <i class="fas fa-redo mr-2"></i> 再玩一次
                </button>
                <button id="share-button"
                    class="flex-1 px-4 py-2 sm:px-6 sm:py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white text-base sm:text-lg font-bold rounded-full hover:from-green-600 hover:to-emerald-600 transition-all transform hover:scale-105 shadow-lg flex items-center justify-center">
                    <i class="fas fa-share-alt mr-2"></i> 分享成績
                </button>
            </div>


        </div>
    </div>

    <!-- 排行榜 Modal -->
    <div id="leaderboard-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 border-2 border-indigo-500 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-indigo-900/50 p-4 flex justify-between items-center border-b border-indigo-500">
                <h3 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-crown text-yellow-400 mr-2"></i> 全球英雄榜
                </h3>
                <button id="close-leaderboard" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-4 max-h-[60vh] overflow-y-auto">
                <div id="leaderboard-list" class="space-y-2">
                    <!-- 排行榜資料會動態插入此處 -->
                    <div class="text-center py-8 text-gray-400">
                        <i class="fas fa-spinner fa-spin mr-2"></i> 正在載入排名...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 教師工具 Modal -->
    <div id="teacher-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-900 border-2 border-cyan-500 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
            <div class="bg-cyan-900/50 p-4 flex justify-between items-center border-b border-cyan-500">
                <h3 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-edit text-cyan-400 mr-2"></i> 自訂教學詞庫
                </h3>
                <button id="close-teacher-modal" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">詞庫標題 (例如：第十課 生字複習)</label>
                    <input type="text" id="new-wordset-title" placeholder="輸入標題..."
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white focus:border-cyan-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">詞彙清單 (請用中文逗號、空格或換行分隔)</label>
                    <textarea id="new-wordset-words" rows="5" placeholder="例如：台灣, 美麗, 科技, 注音..."
                        class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white focus:border-cyan-400 outline-none resize-none"></textarea>
                </div>
                <div id="publish-result" class="hidden p-3 bg-emerald-900/40 border border-emerald-500 rounded-lg">
                    <p class="text-sm text-emerald-400">已成功發佈！您的詞庫代碼為：</p>
                    <div id="generated-code" class="text-2xl font-black text-white text-center tracking-widest mt-1">
                        ------</div>
                </div>
                <button id="publish-button"
                    class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold rounded-xl hover:from-cyan-600 hover:to-blue-600 transition-all shadow-lg flex items-center justify-center">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> 立即發佈並取得代碼
                </button>
            </div>
        </div>
    </div>

    <!-- 動態伴學吉祥物 (太空貓咪) -->
    <div id="mascot"
        class="mascot-idle fixed bottom-4 left-4 z-[40] text-6xl drop-shadow-2xl pointer-events-none transition-transform duration-300">
        🐱
    </div>

    <!-- 虛擬注音鍵盤 (行動裝置適配) -->
    <div id="virtual-keyboard-container"
        class="fixed bottom-0 left-0 w-full z-[50] p-1 sm:p-2 bg-gray-900/95 backdrop-blur-lg border-t border-gray-700 transition-transform duration-300 translate-y-full shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div id="virtual-keyboard" class="max-w-4xl mx-auto flex flex-col gap-1 w-full select-none">
            <!-- 鍵盤列動態生成 -->
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
